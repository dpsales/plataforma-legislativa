[build]
builder = "DOCKERFILE"
dockerfilePath = "paginaInicial/Dockerfile.railway"

[deploy]
startCommand = "sh -c 'gunicorn --bind 0.0.0.0:${PORT:-8080} --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-120} pagina_inicial.wsgi:application'"
healthcheckPath = "/login"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
