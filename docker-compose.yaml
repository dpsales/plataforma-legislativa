# version: "3.8"
#
services:
  revProxy:
    image: ghcr.io/nginxinc/nginx-unprivileged:1.25.2
    ports:
      - "8080:8080"
    environment:
      SECRET_KEY: ${SECRET_KEY:-changeme}
    volumes:
      - ./revProxy/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - paginaInicial

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  buscacomissoescd:
    build:
      context: ./buscaComissoesCD
      dockerfile: Dockerfile
    image: gcr.io/plataforma-legislativa/busca-comissoes-cd:web
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_USE_X_FORWARDED_HOST=true
    volumes:
      - ./buscaComissoesCD/database:/app/data
    ports:
      - "8011:8080"

  buscacomissoescd-worker:
    image: gcr.io/plataforma-legislativa/busca-comissoes-cd:web
    depends_on:
      - buscacomissoescd
      - redis
    command: ["/app/scripts/start-worker.sh"]
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_USE_X_FORWARDED_HOST=true
      - WAIT_FOR_MIGRATIONS=1
    volumes:
      - ./buscaComissoesCD/database:/app/data

  buscacomissoessf:
    build:
      context: ./buscaComissoesSF
      dockerfile: Dockerfile
    image: gcr.io/plataforma-legislativa/busca-comissoes-sf:web
    depends_on:
      - redis
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_USE_X_FORWARDED_HOST=true
      - CELERY_TASK_DEFAULT_QUEUE=busca_comissoes_sf
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:8080
    volumes:
      - ./buscaComissoesSF/database:/app/data
    ports:
      - "8012:8080"

  buscacomissoessf-worker:
    image: gcr.io/plataforma-legislativa/busca-comissoes-sf:web
    depends_on:
      - buscacomissoessf
      - redis
    command: ["/app/scripts/start-worker.sh"]
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_USE_X_FORWARDED_HOST=true
      - CELERY_TASK_DEFAULT_QUEUE=busca_comissoes_sf
      - WAIT_FOR_MIGRATIONS=1
    volumes:
      - ./buscaComissoesSF/database:/app/data

  buscacomissoesmistas:
    build:
      context: ./buscaComissoesMistas
      dockerfile: Dockerfile
    image: busca-comissoes-mistas:web
    depends_on:
      - redis
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_USE_X_FORWARDED_HOST=true
      - CELERY_TASK_DEFAULT_QUEUE=busca_comissoes_mistas
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:8080
    volumes:
      - ./buscaComissoesMistas/database:/app/data
    ports:
      - "8013:8080"

  buscacomissoesmistas-worker:
    image: busca-comissoes-mistas:web
    depends_on:
      - buscacomissoesmistas
      - redis
    command: ["/app/scripts/start-worker.sh"]
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DJANGO_USE_X_FORWARDED_HOST=true
      - CELERY_TASK_DEFAULT_QUEUE=busca_comissoes_mistas
      - WAIT_FOR_MIGRATIONS=1
    volumes:
      - ./buscaComissoesMistas/database:/app/data

  buscamaterias:
    build:
      context: ./buscaMaterias
      dockerfile: dockerfile
    image: gcr.io/plataforma-legislativa/busca-materias:web
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - DJANGO_USE_X_FORWARDED_HOST=true
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:8080
    volumes:
      - ./database:/app/data
      - ./buscaMaterias/proposicoes_ids.json:/app/proposicoes_ids.json:ro
    ports:
      - "8014:8080"

  buscareqs:
    build:
      context: ./buscaReqs
      dockerfile: Dockerfile
    image: gcr.io/plataforma-legislativa/busca-reqs:web
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - DJANGO_USE_X_FORWARDED_HOST=true
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:8080
    volumes:
      - ./database:/app/data
    ports:
      - "8015:8080"

