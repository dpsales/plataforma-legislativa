<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login - MPO no Congresso</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.4.0 (versão estável) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Login - MPO no Congresso</h1>
        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login">
            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="mb-3">
                <label for="token" class="form-label">Token:</label>
                <!-- Contêiner relativo para o input e o ícone -->
                <div class="position-relative">
                    <!-- Adicionamos um padding-right no input para não sobrepor o texto ao ícone -->
                    <input type="password" class="form-control" id="token" name="token" required style="padding-right: 40px;">
                    <!-- Ícone posicionado absolutamente -->
                    <span 
                        style="
                          position: absolute;
                          top: 50%;
                          right: 10px;
                          transform: translateY(-50%);
                          cursor: pointer;
                        "
                        onclick="toggleTokenVisibility()"
                    >
                        <i id="toggle-icon" class="fa-solid fa-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function toggleTokenVisibility() {
        var tokenInput = document.getElementById('token');
        var toggleIcon = document.getElementById('toggle-icon');
        if (tokenInput.type === 'password') {
          tokenInput.type = 'text';
          toggleIcon.classList.remove('fa-eye');
          toggleIcon.classList.add('fa-eye-slash');
        } else {
          tokenInput.type = 'password';
          toggleIcon.classList.remove('fa-eye-slash');
          toggleIcon.classList.add('fa-eye');
        }
      }
    </script>
</body>
</html>
