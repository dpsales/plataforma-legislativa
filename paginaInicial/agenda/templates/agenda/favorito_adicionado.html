{% extends "base.html" %}

{% block title %}Favorito Adicionado{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <h4 class="alert-heading">✅ Favorito adicionado!</h4>
        <p>{{ nome }} foi adicionado aos seus favoritos com sucesso.</p>
        <a href="{% url 'agenda:semanal' %}" class="btn btn-primary btn-sm">
            Voltar à Agenda
        </a>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
{% endblock %}
